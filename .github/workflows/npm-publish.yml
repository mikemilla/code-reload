name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1 (Node 22 ships npm 10.x).
      - run: npm install -g npm@11

      - run: npm ci

      - run: npm run typescript

      - name: Skip if version already published
        id: version
        run: |
          PUBLISHED=$(npm view code-reload version 2>/dev/null || true)
          CURRENT=$(node -p "require('./package.json').version")
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ -n "$PUBLISHED" ] && [ "$PUBLISHED" = "$CURRENT" ]; then
            echo "Version $CURRENT already on npm; skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Trusted publishing: OIDC via id-token: write — do not set NODE_AUTH_TOKEN
      # (an empty NPM_TOKEN secret overrides npm's GitHub provenance auth).
      - name: Publish to npm
        if: steps.version.outputs.skip != 'true'
        run: npm publish --provenance
